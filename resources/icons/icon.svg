<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="basketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3F3D9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009B7D;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="90" fill="url(#basketGrad)" />

  <!-- Basket/Tray body -->
  <rect x="80" y="240" width="352" height="200" rx="24" fill="#FFFFFF" fill-opacity="0.15" />
  <path d="M70 260 H442 Q452 260 452 270 V400 Q452 424 432 424 H80 Q60 424 60 400 V270 Q60 260 70 260 Z"
        fill="#FFFFFF" fill-opacity="0.2" />

  <!-- Basket rim -->
  <rect x="60" y="220" width="392" height="40" rx="12" fill="#FFFFFF" fill-opacity="0.25" />

  <!-- Downward arrow indicating "drop" -->
  <g transform="translate(256, 160)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="50" fill="url(#dropGrad)" />

    <path d="M0 -18 L0 22" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <polyline points="-16,10 0,26 16,10" fill="none" stroke="#FFFFFF"
              stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Horizontal bar on top -->
    <line x1="-22" y1="-18" x2="22" y2="-18" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Items inside basket (simplified) -->
  <rect x="120" y="270" width="100" height="70" rx="8" fill="#FFFFFF" fill-opacity="0.2" />
  <rect x="240" y="280" width="80" height="60" rx="8" fill="#FFFFFF" fill-opacity="0.15" />
  <rect x="340" y="275" width="60" height="55" rx="8" fill="#FFFFFF" fill-opacity="0.2" />
  <circle cx="400" cy="200" r="8" fill="#00D4AA" />
  <circle cx="420" cy="190" r="6" fill="#00D4AA" />
  <circle cx="412" cy="180" r="5" fill="#00D4AA" />
</svg>
